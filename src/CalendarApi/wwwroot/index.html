<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>" />
</head>
<body>
  <!-- Top navigation -->
  <header class="app-header">
    <div class="header-left">
      <span class="brand">Calendar</span>
      <a class="nav-tab" href="#" aria-current="page">Month</a>
    </div>
    <div class="header-right">
      <form id="searchForm" class="search" role="search">
        <span class="material-symbols-outlined search-icon">search</span>
        <input id="searchInput" type="search" placeholder="Search events, projects…" autocomplete="off" />
      </form>
      <div class="header-icons">
        <button class="icon-btn" type="button" aria-label="Notifications"><span class="material-symbols-outlined">notifications</span></button>
        <button class="icon-btn" type="button" aria-label="Settings"><span class="material-symbols-outlined">settings</span></button>
        <div class="avatar" aria-hidden="true"><span class="material-symbols-outlined">person</span></div>
      </div>
    </div>
  </header>

  <!-- Month navigation -->
  <section class="month-nav">
    <button id="prevMonth" class="nav-arrow" type="button" aria-label="Previous month"><span class="material-symbols-outlined">chevron_left</span></button>
    <h1 id="monthLabel">…</h1>
    <button id="nextMonth" class="nav-arrow" type="button" aria-label="Next month"><span class="material-symbols-outlined">chevron_right</span></button>
    <button id="todayBtn" class="today-btn" type="button">Today</button>
  </section>

  <!-- Body: scrollable day list + legend aside -->
  <div class="content">
    <main class="day-list">
      <div class="day-list-inner" id="dayList" aria-live="polite"></div>
    </main>

    <aside class="legend-panel" aria-label="Projects and tasks this month">
      <div class="legend-actions">
        <button id="newProject" class="btn primary block" type="button"><span class="material-symbols-outlined">add_circle</span>New Project</button>
        <button id="newTask" class="btn outline block" type="button"><span class="material-symbols-outlined">add</span>New Task</button>
      </div>
      <div>
        <h2 class="legend-title">Calendar Legend</h2>
        <div id="legendList" class="legend-groups"></div>
      </div>
    </aside>
  </div>

  <!-- Mobile create action (shown when the legend is hidden) -->
  <button id="fab" class="fab" type="button" aria-label="New project"><span class="material-symbols-outlined">add</span></button>

  <!-- Create / edit modal -->
  <div id="modalBackdrop" class="backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">New element</h3>
        <button id="modalClose" class="icon-btn" type="button" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
      </div>
      <form id="elementForm">
        <input type="hidden" id="fieldId" />
        <input type="hidden" id="fieldKind" />
        <label>Name
          <input type="text" id="fieldName" required maxlength="120" />
        </label>
        <label>Description
          <textarea id="fieldDescription" rows="3" maxlength="1000"></textarea>
        </label>
        <div class="row">
          <label>Start date
            <input type="date" id="fieldStart" required />
          </label>
          <label>End date
            <input type="date" id="fieldEnd" required />
          </label>
        </div>
        <label>Color (hex)
          <input type="text" id="fieldColor" placeholder="#004ac6" maxlength="7"
                 pattern="#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})" />
        </label>
        <p id="formError" class="form-error hidden"></p>
        <div class="modal-foot">
          <button type="button" id="deleteBtn" class="btn danger hidden">Delete</button>
          <span class="spacer"></span>
          <button type="button" id="cancelBtn" class="ghost">Cancel</button>
          <button type="submit" id="saveBtn" class="btn primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Search results overlay -->
  <div id="searchBackdrop" class="backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
      <div class="modal-head">
        <h3 id="searchTitle">Search results</h3>
        <button id="searchClose" class="icon-btn" type="button" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js?v=2"></script>
</body>
</html>
